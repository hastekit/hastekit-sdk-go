<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HasteKit · AG-UI</title>
<style>
  :root {
    --bg: #0f1115; --panel: #161a22; --panel-2: #1d2330;
    --border: #2a3242; --text: #e6e9ef; --muted: #8b94a7;
    --accent: #7aa2f7; --ok: #9ece6a; --err: #f7768e; --warn: #e0af68;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; height: 100vh; overflow: hidden;
  }

  /* ── Sidebar ─────────────────────────────────────────────── */
  aside {
    width: 280px; flex: 0 0 280px; background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; min-height: 0;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 14px; border-bottom: 1px solid var(--border);
    font-size: 15px; font-weight: 600; letter-spacing: -.2px;
  }
  .brand .mark { color: var(--accent); }
  .side-controls { padding: 12px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  select, button, textarea {
    font: inherit; color: var(--text); background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 8px;
  }
  select { padding: 7px 10px; width: 100%; }
  button { padding: 7px 14px; cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: .45; cursor: default; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #0f1115; font-weight: 600; }

  #thread-list { flex: 1; overflow-y: auto; padding: 6px; }
  .thread-item {
    display: block; width: 100%; text-align: left; padding: 8px 10px;
    background: transparent; border: none; border-radius: 6px;
    margin-bottom: 2px; cursor: pointer; color: var(--text); font-size: 13px;
  }
  .thread-item:hover { background: var(--panel-2); border-color: transparent; }
  .thread-item.selected { background: var(--panel-2); }
  .thread-item .title {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .thread-item.selected .title { font-weight: 600; }
  .thread-item .time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .hint { padding: 12px; font-size: 12px; color: var(--muted); }
  .hint.error { color: var(--err); }

  /* ── Chat area ───────────────────────────────────────────── */
  .chat { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  main { flex: 1; overflow-y: auto; padding: 20px 0 12px; }
  .feed { max-width: 760px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }

  .msg { border-radius: 12px; padding: 10px 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { background: var(--panel-2); border: 1px solid var(--border); align-self: flex-end; max-width: 85%; }
  .msg.assistant { align-self: stretch; }
  .msg .who { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; white-space: normal; }

  details.reasoning { border-left: 2px solid var(--border); padding: 2px 0 2px 12px; color: var(--muted); font-size: 13px; }
  details.reasoning summary { cursor: pointer; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; list-style: none; }
  details.reasoning summary::before { content: "▸ "; }
  details.reasoning[open] summary::before { content: "▾ "; }
  details.reasoning .body { white-space: pre-wrap; word-break: break-word; margin-top: 4px; }

  .tool { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; font-family: var(--mono); font-size: 12.5px; }
  .tool .name { color: var(--warn); }
  .tool .args, .tool .result { white-space: pre-wrap; word-break: break-word; color: var(--muted); margin-top: 4px; }
  .tool .result { border-top: 1px dashed var(--border); padding-top: 6px; }
  .tool .result.pending { color: var(--muted); font-style: italic; }
  .tool img { max-width: 100%; border-radius: 8px; margin-top: 6px; }

  .approval { background: var(--panel); border: 1px solid var(--warn); border-radius: 12px; padding: 12px 14px; }
  .approval h3 { margin: 0 0 8px; font-size: 13px; color: var(--warn); text-transform: uppercase; letter-spacing: .06em; }
  .approval .call { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 12.5px; }
  .approval .call:last-of-type { border-bottom: 0; }
  .approval .call .meta { flex: 1; min-width: 0; }
  .approval .call .meta .args { color: var(--muted); white-space: pre-wrap; word-break: break-word; }
  .approval .call button.sel { border-color: var(--accent); background: var(--accent); color: #0f1115; }
  .approval .actions { margin-top: 10px; text-align: right; }

  .status { color: var(--muted); font-size: 12.5px; display: flex; align-items: center; gap: 8px; }
  .status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .25; } }
  .error { color: var(--err); font-size: 13px; }
  .notice { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0; }

  footer { background: var(--panel); border-top: 1px solid var(--border); padding: 12px 16px; }
  .composer { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  .composer textarea { flex: 1; resize: none; padding: 10px 12px; min-height: 42px; max-height: 160px; }
  .composer textarea:focus { outline: none; border-color: var(--accent); }
</style>
</head>
<body>
<aside>
  <div class="brand"><span class="mark">⚡</span> HasteKit <span style="color:var(--muted);font-weight:400">AG-UI</span></div>
  <div class="side-controls">
    <select id="agent" title="Agent"></select>
    <button id="new-thread" class="primary">+ New chat</button>
  </div>
  <div id="thread-list"></div>
</aside>

<div class="chat">
  <main><div class="feed" id="feed">
    <div class="notice">Send a message to start the conversation.</div>
  </div></main>

  <footer><div class="composer">
    <textarea id="input" rows="1" placeholder="Message the agent… (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send" class="primary">Send</button>
  </div></footer>
</div>

<script>
(() => {
  const API = "/api/agui";

  const feed = document.getElementById("feed");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const agentSel = document.getElementById("agent");
  const threadList = document.getElementById("thread-list");

  let threadId = crypto.randomUUID();
  let threadIsNew = true;   // becomes false once the thread exists server-side
  let history = [];         // AG-UI Message[] — echoed back on every POST
  let running = false;
  let threads = [];         // last-fetched thread listing
  let listingSupported = true;

  // ── Agents ────────────────────────────────────────────────

  fetch(API + "/agents").then(r => r.json()).then(d => {
    for (const name of d.agents || []) {
      const opt = document.createElement("option");
      opt.value = opt.textContent = name;
      agentSel.appendChild(opt);
    }
    if (!agentSel.options.length) {
      note("No agents registered on the server.");
    } else {
      refreshThreads();
    }
  }).catch(() => note("Could not load agents from " + API + "/agents"));

  agentSel.onchange = () => { newChat(); refreshThreads(); };
  document.getElementById("new-thread").onclick = () => newChat();

  function newChat() {
    threadId = crypto.randomUUID();
    threadIsNew = true;
    history = [];
    feed.innerHTML = "";
    note("Send a message to start the conversation.");
    renderThreads();
  }

  // ── Conversation list ─────────────────────────────────────

  async function refreshThreads() {
    if (!agentSel.value || !listingSupported) return;
    try {
      const res = await fetch(API + "/agents/" + encodeURIComponent(agentSel.value) + "/threads");
      if (res.status === 501) {
        // Persistence adapter can't enumerate threads — hide the list.
        listingSupported = false;
        threadList.innerHTML = "";
        const hint = document.createElement("div");
        hint.className = "hint";
        hint.textContent = "Conversation history is not available for this agent.";
        threadList.appendChild(hint);
        return;
      }
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      threads = data.threads || [];
      renderThreads();
    } catch (err) {
      threadList.innerHTML = "";
      const hint = document.createElement("div");
      hint.className = "hint error";
      hint.textContent = "Could not load conversations: " + err;
      threadList.appendChild(hint);
    }
  }

  function renderThreads() {
    threadList.innerHTML = "";
    if (!threads.length) {
      const hint = document.createElement("div");
      hint.className = "hint";
      hint.textContent = "No conversations yet — start a new chat.";
      threadList.appendChild(hint);
      return;
    }
    for (const t of threads) {
      const item = document.createElement("button");
      item.className = "thread-item" + (t.thread_id === threadId ? " selected" : "");
      const title = document.createElement("div");
      title.className = "title";
      title.textContent = t.title || "Untitled";
      const time = document.createElement("div");
      time.className = "time";
      time.textContent = relativeTime(t.updated_at);
      item.append(title, time);
      item.onclick = () => selectThread(t);
      threadList.appendChild(item);
    }
  }

  async function selectThread(t) {
    if (running || t.thread_id === threadId) return;
    try {
      const res = await fetch(API + "/agents/" + encodeURIComponent(agentSel.value) +
        "/threads/" + encodeURIComponent(t.thread_id) + "/messages");
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      threadId = t.thread_id;
      threadIsNew = false;
      history = data.messages || [];
      renderHistory(history);
      renderThreads();
    } catch (err) {
      note("Could not load conversation: " + err);
    }
  }

  // renderHistory redraws the feed from a hydrated AG-UI message
  // list: user/assistant bubbles plus tool cards with results paired
  // by toolCallId.
  function renderHistory(msgs) {
    feed.innerHTML = "";
    if (!msgs.length) {
      note("Empty conversation — send a message.");
      return;
    }
    const toolCards = {}; // toolCallId → result element
    for (const m of msgs) {
      switch (m.role) {
        case "user":
        case "system":
        case "developer": {
          const bubble = el("div", "msg user");
          bubble.textContent = m.content || "";
          break;
        }
        case "assistant": {
          if (m.content) {
            const wrap = el("div", "msg assistant");
            const who = el("div", "who", wrap);
            who.textContent = agentSel.value;
            const body = el("div", "", wrap);
            body.textContent = m.content;
          }
          for (const tc of m.toolCalls || []) {
            const card = el("div", "tool");
            const name = el("div", "name", card);
            name.textContent = "⚙ " + (tc.function?.name || "tool");
            const args = el("div", "args", card);
            args.textContent = tc.function?.arguments || "";
            const result = el("div", "result pending", card);
            result.textContent = "no result";
            toolCards[tc.id] = result;
          }
          break;
        }
        case "tool": {
          const slot = toolCards[m.toolCallId];
          if (slot) {
            slot.classList.remove("pending");
            slot.textContent = m.content || "";
          } else {
            const card = el("div", "tool");
            const result = el("div", "result", card);
            result.textContent = m.content || "";
          }
          break;
        }
      }
    }
    scroll();
  }

  function relativeTime(iso) {
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return "";
    const diff = Date.now() - d.getTime();
    const min = 60_000, hr = 3_600_000, day = 86_400_000;
    if (diff < min) return "just now";
    if (diff < hr) return Math.floor(diff / min) + "m ago";
    if (diff < day) return Math.floor(diff / hr) + "h ago";
    if (diff < 7 * day) return Math.floor(diff / day) + "d ago";
    return d.toLocaleDateString();
  }

  // ── Composer ──────────────────────────────────────────────

  sendBtn.onclick = send;
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });

  function note(text) {
    const div = document.createElement("div");
    div.className = "notice";
    div.textContent = text;
    feed.appendChild(div);
  }

  function el(tag, cls, parent) {
    const node = document.createElement(tag);
    if (cls) node.className = cls;
    (parent || feed).appendChild(node);
    return node;
  }

  function scroll() { feed.parentElement.scrollTop = feed.parentElement.scrollHeight; }

  function setRunning(on) {
    running = on;
    sendBtn.disabled = on;
    input.disabled = on;
    if (!on) input.focus();
  }

  function send() {
    const text = input.value.trim();
    if (!text || running || !agentSel.value) return;
    input.value = ""; input.style.height = "auto";

    if (threadIsNew) feed.innerHTML = "";

    const userMsg = { id: "msg_" + crypto.randomUUID(), role: "user", content: text };
    history.push(userMsg);

    const bubble = el("div", "msg user");
    bubble.textContent = text;
    scroll();

    run({ threadId, runId: crypto.randomUUID(), messages: history });
  }

  // ── Run + SSE pump ────────────────────────────────────────

  async function run(body) {
    setRunning(true);

    const status = el("div", "status");
    el("span", "dot", status);
    const statusText = el("span", "", status);
    statusText.textContent = "running…";
    scroll();

    // Per-run render state.
    const state = {
      statusText,
      textEl: null, textId: null,
      reasoningEl: null, reasoningBody: null,
      tools: {},            // toolCallId → {root, args, argsText, result}
      pendingApproval: null,
    };

    try {
      const res = await fetch(API + "/agents/" + encodeURIComponent(agentSel.value) + "/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const errBody = await res.text();
        throw new Error("HTTP " + res.status + ": " + errBody);
      }
      await pumpSSE(res.body, (type, data) => handleEvent(state, type, data));
    } catch (err) {
      const e = el("div", "error");
      e.textContent = String(err);
    } finally {
      status.remove();
      setRunning(false);
      scroll();
      threadIsNew = false;
      refreshThreads();
      if (state.pendingApproval) renderApproval(state.pendingApproval);
    }
  }

  async function pumpSSE(stream, onEvent) {
    const reader = stream.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf("\n\n")) >= 0) {
        const frame = buf.slice(0, idx);
        buf = buf.slice(idx + 2);
        let type = "", data = "";
        for (const line of frame.split("\n")) {
          if (line.startsWith("event:")) type = line.slice(6).trim();
          else if (line.startsWith("data:")) data += line.slice(5).trim();
          // lines starting with ":" are keep-alive comments — ignore
        }
        if (!type) continue;
        let parsed = null;
        try { parsed = JSON.parse(data); } catch { /* non-JSON data — skip */ }
        onEvent(type, parsed);
      }
    }
  }

  // ── Event rendering ───────────────────────────────────────

  function handleEvent(state, type, ev) {
    switch (type) {
      case "TEXT_MESSAGE_START": {
        const wrap = el("div", "msg assistant");
        const who = el("div", "who", wrap);
        who.textContent = agentSel.value;
        state.textEl = el("div", "", wrap);
        state.textId = ev?.messageId;
        break;
      }
      case "TEXT_MESSAGE_CONTENT":
        if (state.textEl) state.textEl.textContent += ev?.delta ?? "";
        scroll();
        break;
      case "TEXT_MESSAGE_END":
        if (state.textEl) {
          history.push({
            id: state.textId || "msg_" + crypto.randomUUID(),
            role: "assistant",
            content: state.textEl.textContent,
          });
        }
        state.textEl = null;
        break;

      case "REASONING_START": {
        const details = el("details", "reasoning");
        const summary = el("summary", "", details);
        summary.textContent = "reasoning";
        state.reasoningBody = el("div", "body", details);
        break;
      }
      case "REASONING_MESSAGE_CONTENT":
        if (state.reasoningBody) state.reasoningBody.textContent += ev?.delta ?? "";
        scroll();
        break;
      case "REASONING_END":
        state.reasoningBody = null;
        break;

      case "TOOL_CALL_START": {
        const root = el("div", "tool");
        const name = el("div", "name", root);
        name.textContent = "⚙ " + (ev?.toolCallName || "tool");
        const args = el("div", "args", root);
        const result = el("div", "result pending", root);
        result.textContent = "running…";
        state.tools[ev?.toolCallId] = { root, args, argsText: "", result, name: ev?.toolCallName };
        scroll();
        break;
      }
      case "TOOL_CALL_ARGS": {
        const t = state.tools[ev?.toolCallId];
        if (t) { t.argsText += ev?.delta ?? ""; t.args.textContent = t.argsText; scroll(); }
        break;
      }
      case "TOOL_CALL_END": {
        const t = state.tools[ev?.toolCallId];
        if (t) {
          history.push({
            id: "msg_" + crypto.randomUUID(),
            role: "assistant",
            toolCalls: [{ id: ev.toolCallId, type: "function", function: { name: t.name || "", arguments: t.argsText } }],
          });
        }
        break;
      }
      case "TOOL_CALL_RESULT": {
        const t = state.tools[ev?.toolCallId];
        if (t) {
          t.result.classList.remove("pending");
          t.result.textContent = ev?.content ?? "";
        }
        history.push({
          id: ev?.messageId || "msg_" + crypto.randomUUID(),
          role: "tool",
          toolCallId: ev?.toolCallId,
          content: ev?.content ?? "",
        });
        scroll();
        break;
      }

      case "STEP_STARTED":
        state.statusText.textContent = (ev?.stepName || "step").replaceAll("_", " ") + "…";
        break;
      case "STEP_FINISHED":
        state.statusText.textContent = "running…";
        break;

      case "RUN_ERROR": {
        const e = el("div", "error");
        e.textContent = ev?.message || "run error";
        scroll();
        break;
      }

      case "CUSTOM":
        handleCustom(state, ev);
        break;
    }
  }

  function handleCustom(state, ev) {
    if (!ev) return;
    if (ev.name === "on_interrupt" && ev.value?.kind === "tool_approval") {
      // Render after the SSE pump ends — the run is finished (paused);
      // the approval card drives the resume POST.
      state.pendingApproval = ev.value;
      return;
    }
    if (ev.name === "hastekit.file_generated" && ev.value?.base64 && !ev.value.partial) {
      const card = el("div", "tool");
      const img = el("img", "", card);
      img.src = "data:image/" + (ev.value.outputFormat || "png") + ";base64," + ev.value.base64;
      scroll();
    }
  }

  // ── Human-in-the-loop approval ────────────────────────────

  function renderApproval(value) {
    const card = el("div", "approval");
    const title = el("h3", "", card);
    title.textContent = "Approval required";

    const decisions = {};
    for (const call of value.pendingToolCalls || []) {
      const row = el("div", "call", card);
      const meta = el("div", "meta", row);
      const nm = el("div", "", meta);
      nm.textContent = call.toolCallName || call.toolCallId;
      const args = el("div", "args", meta);
      args.textContent = call.arguments || "";

      const yes = el("button", "", row); yes.textContent = "Approve";
      const no = el("button", "", row); no.textContent = "Reject";
      yes.onclick = () => { decisions[call.toolCallId] = true; yes.classList.add("sel"); no.classList.remove("sel"); };
      no.onclick = () => { decisions[call.toolCallId] = false; no.classList.add("sel"); yes.classList.remove("sel"); };
    }

    const actions = el("div", "actions", card);
    const submit = el("button", "primary", actions);
    submit.className = "primary";
    submit.textContent = "Submit decisions";
    submit.onclick = () => {
      const list = (value.pendingToolCalls || []).map(c => ({
        toolCallId: c.toolCallId,
        approved: decisions[c.toolCallId] === true,
      }));
      card.remove();
      run({
        threadId,
        runId: crypto.randomUUID(),
        messages: history,
        forwardedProps: { command: { resume: { decisions: list } } },
      });
    };
    scroll();
  }
})();
</script>
</body>
</html>
